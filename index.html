<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky 3D | Enlaces Oficiales</title>

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sky3d.com.ar/">
    <meta property="og:title" content="Sky 3D | Enlaces Oficiales">
    <meta property="og:description" content="Soluciones en Impresión y Diseño 3D. SFVC, Catamarca, Argentina.">
    <meta property="og:image" content="https://raw.githubusercontent.com/skyproyectosarg/links/main/logo.png">
    <meta property="og:image:type" content="image/png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Sky 3D | Enlaces Oficiales">
    <meta name="twitter:description" content="Impresión y Diseño 3D en Catamarca.">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/skyproyectosarg/links/main/logo.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-color: #58a6ff;
            --text-color: #ffffff;
            --button-hover: #1f6feb;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .profile-container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--accent-color);
            margin-bottom: 15px;
            object-fit: cover;
            box-shadow: 0 0 15px rgba(88, 166, 255, 0.4);
        }

        h1 { font-size: 24px; margin-bottom: 5px; }
        .location { font-size: 14px; color: #8b949e; margin-bottom: 25px; }
        .location i { color: #f85149; margin-right: 5px; }

        .links-container { width: 100%; }

        .link-card {
            background-color: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 15px 20px;
            margin-bottom: 12px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .link-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent-color);
            background-color: #1c2128;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .link-card i {
            font-size: 20px;
            width: 30px;
            margin-right: 15px;
            text-align: center;
        }

        .link-card span { font-weight: 500; font-size: 16px; flex-grow: 1; }

        .disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .disabled::after {
            content: "Próximamente";
            font-size: 10px;
            background: #30363d;
            padding: 2px 6px;
            border-radius: 4px;
            position: absolute;
            right: 15px;
        }

        footer {
            margin-top: 40px;
            font-size: 12px;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="logo.png" alt="Sky 3D Logo" class="logo">
        <h1>Sky 3D</h1>
        <div class="location">
            <i class="fas fa-map-marker-alt"></i> SFVC, Catamarca, Argentina
        </div>

        <div class="links-container">
            <a href="https://instagram.com/sky3darg" target="_blank" class="link-card">
                <i class="fa-brands fa-instagram"></i>
                <span>Instagram</span>
            </a>
            <a href="https://tiktok.com/@sky3darg" target="_blank" class="link-card">
                <i class="fa-brands fa-tiktok"></i>
                <span>TikTok</span>
            </a>
            <a href="https://youtube.com/@sky3darg" target="_blank" class="link-card">
                <i class="fa-brands fa-youtube"></i>
                <span>YouTube</span>
            </a>
            <a href="https://facebook.com/Sky3DArg" target="_blank" class="link-card">
                <i class="fa-brands fa-facebook"></i>
                <span>Facebook</span>
            </a>
            <a href="https://x.com/sky3darg" target="_blank" class="link-card">
                <i class="fa-brands fa-x-twitter"></i>
                <span>X (Twitter)</span>
            </a>
            <a href="https://threads.net/@sky3darg" target="_blank" class="link-card">
                <i class="fa-brands fa-threads"></i>
                <span>Threads</span>
            </a>
            <a href="mailto:info@sky3d.com.ar" class="link-card">
                <i class="fas fa-envelope"></i>
                <span>Contacto Email</span>
            </a>
            <a href="#" class="link-card disabled">
                <i class="fa-brands fa-whatsapp"></i>
                <span>WhatsApp</span>
            </a>
        </div>
    </div>

    <footer>
        &copy; 2026 Sky 3D - Soluciones en Impresión y Diseño
    </footer>

</body>
</html>
